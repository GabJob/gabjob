<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff7ed"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
    <linearGradient id="orange-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="1100" cy="100" r="180" fill="#fed7aa" opacity="0.4"/>
  <circle cx="100" cy="530" r="220" fill="#fed7aa" opacity="0.3"/>
  
  <!-- Logo icon -->
  <rect x="100" y="120" width="120" height="120" rx="28" fill="url(#orange-grad)"/>
  <path d="M 175 155 A 28 28 0 1 0 175 215 L 175 195 L 158 195" 
        stroke="white" stroke-width="9" stroke-linecap="round" fill="none"/>
  <circle cx="200" cy="225" r="7" fill="white"/>
  
  <!-- Main title -->
  <text x="100" y="320" font-family="Arial, sans-serif" font-size="84" font-weight="800" fill="#111827" letter-spacing="-3">
    Gab<tspan fill="#f97316">Job</tspan>
  </text>
  
  <!-- Subtitle -->
  <text x="100" y="380" font-family="Arial, sans-serif" font-size="36" font-weight="600" fill="#374151">
    Emploi, recrutement et dépannage
  </text>
  
  <!-- Country -->
  <text x="100" y="430" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#f97316">
    au Gabon 🇬🇦
  </text>
  
  <!-- Features pills -->
  <g font-family="Arial, sans-serif" font-size="22" font-weight="700">
    <rect x="100" y="490" width="220" height="50" rx="25" fill="#fff" stroke="#f97316" stroke-width="2"/>
    <text x="210" y="523" text-anchor="middle" fill="#ea580c">👤 Candidats</text>
    
    <rect x="335" y="490" width="220" height="50" rx="25" fill="#fff" stroke="#f97316" stroke-width="2"/>
    <text x="445" y="523" text-anchor="middle" fill="#ea580c">🏢 Recruteurs</text>
    
    <rect x="570" y="490" width="220" height="50" rx="25" fill="#fff" stroke="#f97316" stroke-width="2"/>
    <text x="680" y="523" text-anchor="middle" fill="#ea580c">🔧 Techniciens</text>
  </g>
  
  <!-- URL -->
  <text x="1100" y="600" font-family="Arial, sans-serif" font-size="22" font-weight="600" fill="#9ca3af" text-anchor="end">
    gabjob.org
  </text>
</svg>
